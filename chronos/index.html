<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos: The Grand Descent</title>
    <meta name="description" content="A vertical journey through deep time, from the Big Bang to the Common Era.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="app">
        <section id="hero">
            <div class="hero-content">
                <h1>Chronos</h1>
                <p class="subtitle">The Grand Descent Through Time</p>
                <div class="scroll-prompt">
                    <span>Scroll to descend</span>
                    <div class="arrow"></div>
                </div>
            </div>
        </section>

        <main id="timeline-wrapper">
            <div id="timeline-spine"></div>
            <div id="events-container">
                <!-- Events will be dynamically injected here -->
            </div>
        </main>

        <div id="event-detail-overlay" class="overlay">
            <button id="close-overlay" aria-label="Close">×</button>
            <div class="overlay-content">
                <div id="detail-date" class="date-tag"></div>
                <h2 id="detail-title"></h2>
                <div id="detail-description"></div>
            </div>
        </div>

        <footer>
            <p>Chronos Historical Engine &copy; 2026</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
