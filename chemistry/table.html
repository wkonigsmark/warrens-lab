<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry: Element Database</title>
    <link rel="stylesheet" href="table-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="table-container">
        <header>
            <div class="logo">PERIODIC INDEX</div>
            <nav>
                <a href="index.html">← Back to Lab</a>
            </nav>
        </header>

        <section id="periodic-grid-container">
            <!-- Full 18x9 grid -->
            <div id="periodic-grid"></div>
        </section>

        <section id="element-detail" class="hidden">
            <div id="detail-card" class="card">
                <button id="close-detail">×</button>
                <div class="detail-header">
                    <div id="detail-symbol">H</div>
                    <div class="detail-meta">
                        <h2 id="detail-name">Hydrogen</h2>
                        <p id="detail-category">Diatomic Nonmetal</p>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item"><strong>Atomic Number</strong> <span id="val-number">1</span></div>
                    <div class="detail-item"><strong>Atomic Mass</strong> <span id="val-mass">1.008</span></div>
                    <div class="detail-item"><strong>Electronegativity</strong> <span id="val-en">2.2</span></div>
                    <div class="detail-item"><strong>Block</strong> <span id="val-block">s</span></div>
                    <div class="detail-item full"><strong>Electron Config</strong> <span id="val-config">1s1</span></div>
                </div>
                <p id="detail-summary" class="summary">Hydrogen is the lightest element...</p>
                <a id="detail-wiki" href="#" target="_blank">Learn More on Wikipedia →</a>
            </div>
        </section>
    </div>

    <script src="table-logic.js"></script>
</body>
</html>
