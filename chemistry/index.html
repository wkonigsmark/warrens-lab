<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry: Elements & Fusion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <header>
            <div class="logo">CHEMISTRY</div>
            <div id="stats">
                <span class="stat-item">Correct: <span id="correct-count">0</span></span>
                <span class="stat-item">Level: <span id="level-count">1</span></span>
            </div>
        </header>

        <main id="game-area">
            <div id="element-card" class="card">
                <div class="meta-row">
                    <span id="atomic-number" class="tag">#1</span>
                    <span id="element-type" class="tag type-noble">Noble Gas</span>
                </div>

                <div id="element-symbol" class="symbol-display">H</div>
                <h2 id="question-text">What is this element?</h2>
                
                <div id="options-container">
                    <!-- Options injected by JS -->
                </div>

                <div id="feedback" class="hidden">
                    <p id="feedback-message"></p>
                    <div id="helper-box" class="helper">
                        <strong>The Building Blocks:</strong>
                        <span id="helper-text"></span>
                    </div>
                    <button id="next-btn">Next Element &rarr;</button>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-links">
                <button id="reset-btn">Reset Score</button>
                <a href="table.html" class="db-link">Element Database &rarr;</a>
            </div>
            <p>From Atoms to Molecules</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
