<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Index | Chemistry Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .search-container {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
        }

        #compound-search {
            width: 100%;
            padding: 20px 30px;
            border-radius: 20px;
            border: 2px solid #eee;
            font-size: 1.2rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        #compound-search:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 15px 40px rgba(6, 182, 212, 0.15);
        }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        .compound-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .compound-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            border-color: #e0e0e0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-header h3 {
            margin: 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        .formula-badge {
            background: var(--text-main);
            color: white;
            padding: 5px 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .scientific-name {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-style: italic;
            line-height: 1.4;
        }

        .synonym-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .card-actions {
            margin-top: 10px;
        }

        .copy-btn {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #f1f2f6;
            background: #f1f2f6;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: white;
        }

        .copy-btn.copied {
            background: #e8f5e9;
            border-color: #43a047;
            color: #2e7d32;
        }

        .tag {
            background: #f1f2f6;
            color: var(--text-dim);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .weight-info {
            margin-top: auto;
            border-top: 1px solid #f9f9f9;
            padding-top: 15px;
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        .no-results {
            grid-column: 1 / -1;
            padding: 60px;
            text-align: center;
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .back-nav {
            max-width: 1200px;
            margin: 20px auto;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-dim);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>Compound Index</h1>
                <p>Knowledge Database</p>
            </div>
            <div class="mode-nav">
                <a href="index.html" class="mode-btn">Lab Home</a>
                <a href="table.html" class="mode-btn">Periodic Table</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="back-nav">
            <a href="index.html" class="back-link">← Return to Lab</a>
        </div>

        <div class="search-container">
            <input type="text" id="compound-search" placeholder="Search by name, formula, or common use (e.g. 'sugar', 'acid', 'C2H5OH')...">
        </div>

        <div id="index-grid" class="index-grid">
            <!-- Cards populated by JS -->
            <div class="no-results">Initializing database...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Chemistry Lab | Powered by PubChem</p>
    </footer>

    <script>
        let compounds = [];
        const searchInput = document.getElementById('compound-search');
        const grid = document.getElementById('index-grid');

        async function init() {
            try {
                const response = await fetch('compounds.json');
                compounds = await response.json();
                renderIndex(compounds);
            } catch (e) {
                grid.innerHTML = '<div class="no-results">Error loading database.</div>';
            }

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = compounds.filter(c => {
                    return c.common_name.toLowerCase().includes(term) ||
                           c.formula.toLowerCase().includes(term) ||
                           c.iupac_name.toLowerCase().includes(term) ||
                           (c.synonyms && c.synonyms.some(s => s.toLowerCase().includes(term)));
                });
                renderIndex(filtered);
            });
        }

        function renderIndex(list) {
            if (list.length === 0) {
                grid.innerHTML = '<div class="no-results">No compounds found matching your search.</div>';
                return;
            }

            grid.innerHTML = list.map(c => `
                <div class="compound-card">
                    <div class="card-header">
                        <h3>${c.common_name}</h3>
                        <div class="formula-badge">${c.formula}</div>
                    </div>
                    <div class="scientific-name">${c.iupac_name}</div>
                    <div class="synonym-tags">
                        ${(c.synonyms || []).slice(0, 6).map(s => `<span class="tag">${s}</span>`).join('')}
                    </div>
                    <div class="card-actions">
                        <button class="copy-btn" onclick="copyRecipe('${c.formula}', this)">
                            <span>Copy Formula</span>
                        </button>
                    </div>
                    <div class="weight-info">
                        <span>CID: ${c.cid}</span>
                        <span>${c.weight} u</span>
                    </div>
                </div>
            `).join('');
        }

        async function copyRecipe(formula, btn) {
            try {
                await navigator.clipboard.writeText(formula);
                const originalText = btn.innerHTML;
                btn.classList.add('copied');
                btn.innerHTML = '<span>Copied!</span>';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = originalText;
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        init();
    </script>
</body>
</html>
