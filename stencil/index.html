<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stencil</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="controls">
            <div class="controls-row top-row" style="position: relative;">
                <div class="branding-section">
                    <img src="assets/banner/stencil.png" alt="Stencil" class="brand-logo">
                </div>
                <!-- Row 1: Word Counters / Settings -->
                <div class="settings-group">
                    <div class="settings-item">
                        <label>Mode</label>
                        <button id="modeBtn" class="setting-val">VOC</button>
                    </div>
                    <div class="settings-item">
                        <label>Level</label>
                        <button id="levelBtn" class="setting-val">PB</button>
                    </div>
                    <div class="settings-item">
                        <label>Words</label>
                        <button id="wordsBtn" class="setting-val">3</button>
                    </div>
                    <div class="settings-item">
                        <label>Rounds</label>
                        <button id="roundsBtn" class="setting-val">3</button>
                    </div>
                </div>
                
                <!-- Expanded Meta Metadata (Moved to Top Right) -->
                <div class="meta-info" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2;">
                    <span class="level-indicator">Level: Pre-Beginner</span>
                    <span class="mode-indicator">Mode: Vocabulary</span>
                </div>
            </div>

            <!-- Row 2: Print/Worksheet (Centered & Subtle) -->
            <div class="controls-row middle-row">
                <div class="print-group">
                    <button id="printBtn" class="print-button">Worksheet</button>
                    <button id="printDrawBtn" class="print-button draw-print">Draw & Write</button>
                    <button id="printVocabBtn" class="print-button vocab-print">Vocab Quiz</button>
                    <button id="printIndependentBtn" class="print-button independent-print">Ind. Spelling</button>
                </div>
            </div>

            <!-- Row 3: Core Progress & Gameplay -->
            <div class="controls-row bottom-row">
                <div class="progress-section">
                    <div class="thermometer-container">
                        <div id="thermometerBulb" class="thermometer-bulb"></div>
                        <div class="thermometer-tube">
                            <div id="thermometerMercury" class="thermometer-mercury"></div>
                            <div class="mercury-highlights"></div>
                        </div>
                    </div>
                    <div class="status-meta-row">
                        <div id="progressRatio" class="progress-label">Word 1/3 • Round 1/3</div>
                    </div>
                </div>
                <div class="action-group">
                    <button id="clearBtn" class="clear-button">Clear</button>
                    <button id="newWordBtn" class="new-word-button">New Word</button>
                </div>
            </div>
            <div class="word-display" id="wordDisplay"></div>
        </div>

        <div class="canvas-wrapper">
            <div class="guides-column">
                <div class="guide-icon" title="Sky line">☀️</div>
                <div class="guide-icon" title="Plane line">✈️</div>
                <div class="guide-icon" title="Grass line">🌱</div>
                <div class="guide-icon" title="Worm line">🪱</div>
            </div>
            <canvas id="drawingCanvas"></canvas>
        </div>
    </div>

    <!-- Victory Modal -->
    <div id="victoryModal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉 Fantastic! 🎉</h2>
            <p id="victoryMessage">You completed the level in 0:00.</p>
            <p>Keep going, and think about trying a harder level!</p>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <!-- Vocabulary Modal -->
    <div id="vocabModal" class="modal hidden">
        <div class="modal-content vocab-content">
            <h2>Select the Image</h2>
            <h3 id="vocabTargetWord" class="vocab-target-word"></h3>
            <div id="vocabImages" class="vocab-grid"></div>
        </div>
    </div>

    <div id="settingsOverlay" class="overlay hidden">
        <div class="overlay-content">
            <h3 id="overlayTitle">Select Option</h3>
            <div id="overlayGrid" class="options-grid"></div>
            <button id="closeOverlay" class="close-overlay">Cancel</button>
        </div>
    </div>

    <div class="version-tag">v2.2 milestone</div>

    <script src="app.js"></script>
</body>

</html>
