<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Warren's Baseball Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <style>
        .brewers-side {
            background: linear-gradient(135deg, #002D62 0%, #0A1B33 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rockies-side {
            background: linear-gradient(135deg, #333366 0%, #1a1a33 100%);
        }

        .brewers-side h2 {
            color: #8F7230;
        }

        .rockies-side h2 {
            color: #C4CED4;
        }

        .logo-placeholder {
            font-size: 8rem;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .team-card-link:hover .logo-placeholder {
            transform: scale(1.1) rotate(5deg);
        }

        .hub-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        .hub-title h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.8;
            color: white;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .hub-title {
                top: 20px;
                padding: 0 10px;
            }

            .hub-title h1 {
                font-size: 0.9rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>

<body>
    <div class="hub-title">
        <h1>Coach Warren's Baseball Hub</h1>
    </div>
    <div class="home-grid">
        <a href="brewers/index.html" class="team-card-link brewers-side">
            <img src="./assets/brewers-logo.png" alt="Brewers Logo" class="hub-logo">
            <h2>Brewers</h2>
            <span class="age-group">5 Year Old T-Ball</span>
        </a>
        <a href="rockies/index.html" class="team-card-link rockies-side">
            <img src="./assets/rockies-logo.png" alt="Rockies Logo" class="hub-logo">
            <h2>Rockies</h2>
            <span class="age-group">7 Year Old Baseball</span>
        </a>
    </div>
</body>

</html>
